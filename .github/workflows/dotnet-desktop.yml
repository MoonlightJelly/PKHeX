name: Build PKHeX

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    # Requires .NET 10 as of latest PKHeX version
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore PKHeX.sln
    
    - name: Build
      run: dotnet build PKHeX.sln --configuration Release --no-restore
    
    - name: Test
      run: dotnet test Tests/PKHeX.Core.Tests/PKHeX.Core.Tests.csproj --configuration Release --no-build
      continue-on-error: true  # Tests might have culture-specific dependencies
    
    - name: Publish standalone Windows app
      run: dotnet publish PKHeX.WinForms/PKHeX.WinForms.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
    
    - name: Upload PKHeX artifact
      uses: actions/upload-artifact@v4
      with:
        name: PKHeX-win-x64
        path: ./publish/*
