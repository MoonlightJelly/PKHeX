name: Build and Release PKHeX

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write  # This grants permission to create releases

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore PKHeX.sln
    
    - name: Build
      run: dotnet build PKHeX.sln --configuration Release --no-restore
    
    - name: Test
      run: dotnet test Tests/PKHeX.Core.Tests/PKHeX.Core.Tests.csproj --configuration Release --no-build
      continue-on-error: true
    
    - name: Publish standalone Windows app
      run: dotnet publish PKHeX.WinForms/PKHeX.WinForms.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
    
    - name: Create ZIP for release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./PKHeX.zip
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./PKHeX.zip
        name: PKHeX ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: false  # Disabled to avoid permission issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PKHeX-win-x64
        path: ./publish/*
